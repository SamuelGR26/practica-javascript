<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Práctica 2</title></head>
<body>
  <!-- practica2.html
       Operaciones matemáticas entre dos números -->
  <h1>Práctica 2 — Operaciones Matemáticas</h1>
  Número 1: <input id="n1" type="number" value="10">
  Número 2: <input id="n2" type="number" value="5">
  <button onclick="run()">Ejecutar</button>
  <pre id="out"></pre>

  <script>
    function run() {
      const n1 = Number(document.getElementById('n1').value);
      const n2 = Number(document.getElementById('n2').value);
      const suma = n1 + n2;
      const resta = n1 - n2;
      const mult = n1 * n2;
      const div = n2 !== 0 ? n1 / n2 : 'División por cero';
      const mod = n2 !== 0 ? n1 % n2 : 'N/A';
      const texto = `Número 1: ${n1}\nNúmero 2: ${n2}\nSuma: ${suma}\nResta: ${resta}\nMultiplicación: ${mult}\nDivisión: ${div}\nMódulo: ${mod}`;
      document.getElementById('out').textContent = texto;
      console.log(texto);
    }
  </script>
</body>
</html>
