<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><title>Práctica 5</title></head>
<body>
  <!-- practica5.html
       Mayor o menor de edad -->
  <h1>Práctica 5 — Mayor o Menor de Edad</h1>
  Edad: <input id="e" type="number" value="17">
  <button onclick="run()">Verificar</button>
  <pre id="out"></pre>

  <script>
    function run() {
      const edad = Number(document.getElementById('e').value);
      const res = edad >= 18 ? 'Mayor de edad' : 'Menor de edad';
      const texto = `Edad: ${edad}\nResultado: ${res}`;
      document.getElementById('out').textContent = texto;
      console.log(texto);
    }
  </script>
</body>
</html>
